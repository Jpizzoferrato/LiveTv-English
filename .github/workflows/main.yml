name: RUN SCRIPT

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Gather m3u
        run: |
          cat << 'EOF' > run_scraper.py
          import requests
          import urllib3
          import json

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          def main():
              headers = {
                  "User-Agent": "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36",
                  "Referer": "https://daddylive.org/channel"
              }
              
              url = "https://daddylive.org/cache/channels.json"
              print(f"Testing connection directly to cache file: {url}")
              
              res = requests.get(url, headers=headers, timeout=15, verify=False)
              
              if res.status_code == 200:
                  print("--- SUCCESS! RAW CACHE SAMPLE ---")
                  try:
                      # Print the first 1500 characters of the raw JSON layout to see the keys
                      print(res.text[:1500])
                  except Exception as e:
                      print(f"Error printing data: {e}")
                  print("---------------------------------")
              else:
                  print(f"Failed to fetch cache. Status code: {res.status_code}")

          if __name__ == "__main__":
              main()
          EOF
          python run_scraper.py
