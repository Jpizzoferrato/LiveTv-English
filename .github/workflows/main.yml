name: RUN SCRIPT

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil python-dotenv

      - name: Gather m3u
        run: |
          cat << 'EOF' > run_scraper.py
          import requests
          import urllib3

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          def main():
              headers = {
                  "User-Agent": "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36",
                  "Referer": "https://daddylive.org/"
              }
              
              print("Fetching raw page source for analysis...")
              res = requests.get("https://daddylive.org/channel", headers=headers, timeout=15, verify=False)
              
              if res.status_code == 200:
                  print("--- RAW HTML START ---")
                  # Output the first 8000 characters of the page structure to inspect the code elements
                  print(res.text[:8000])
                  print("--- RAW HTML END ---")
              else:
                  print(f"Failed to fetch. Status code: {res.status_code}")

          if __name__ == "__main__":
              main()
          EOF
          python run_scraper.py
