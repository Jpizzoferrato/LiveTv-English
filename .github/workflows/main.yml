name: RUN SCRIPT
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allows manual execution

# Corrected security block for GitHub Actions permissions
permissions:
  contents: write
  id-token: write

jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil python-dotenv

      - name: Gather m3u
        run: |
          cat << 'EOF' > run_scraper.py
          import requests
          import re
          import urllib3
          from bs4 import BeautifulSoup

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          def get_html(url):
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/132.0.0.0 Safari/537.36",
                  "Accept-Language": "en-US,en;q=0.9"
              }
              try:
                  res = requests.get(url, headers=headers, timeout=5, verify=False)
                  if res.status_code == 200:
                      return res.text
              except Exception:
                  pass
              return None

          def main():
              raw_channels = []
              
              print("Scraping 24/7 channels...")
              html_247 = get_html("https://daddylive.sx/24-7-channels.php")
              if html_247:
                  soup = BeautifulSoup(html_247, 'html.parser')
                  links = soup.find_all('a', href=re.compile(r'id=\d+'))
                  
                  for link in links:
                      name = link.text.strip()
                      href = link.get('href', '')
                      if not name or 'id=' not in href: continue
                      ch_id = href.split('id=')[1].split('&')[0]
                      
                      if name == "Sky Calcio 7 (257) Italy": name = "DAZN"
                      if ch_id == "853": name = "Canale 5 Italy"
                      
                      raw_channels.append((name, ch_id))

              final_channels = []
              
              print("Verifying and expanding backup links globally...")
              for name, ch_id in raw_channels:
                  if "usa network" in name.lower():
                      for play_num in range(1, 7):
                          player_url = f"https://daddylive.sx/embed/stream-{ch_id}.php?p={play_num}"
                          final_channels.append((f"USA Network ({play_num})", player_url))
                  else:
                      standard_url = f"https://daddylive.sx/watch.php?id={ch_id}"
                      final_channels.append((name, standard_url))

              print("Scraping scheduled events...")
              html_schedule = get_html("https://daddylive.sx/index.php")
              if html_schedule:
                  soup = BeautifulSoup(html_schedule, 'html.parser')
                  event_links = soup.find_all('a', href=re.compile(r'stream-\d+\.php'))
                  for link in event_links:
                      name = link.text.strip()
                      href = link.get('href', '')
                      if not name or not href: continue
                      if "Stream" in name:
                          name = f"Live Event: {name}"
                      stream_url = f"https://daddylive.sx/{href}"
                      final_channels.append((name, stream_url))

              with open("dlhd.m3u", "w", encoding="utf-8") as f:
                  f.write("#EXTM3U\n\n")
                  for name, url in final_channels:
                      f.write(f'#EXTINF:-1 group-title="DLHD Combined",{name}\n{url}\n\n')
              print(f"Successfully generated playlist file with {len(final_channels)} total streams!")

          if __name__ == "__main__":
              main()
          EOF
          python run_scraper.py

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Force Upload New Playlist
        run: |
          git add dlhd.m3u
          git commit -m "Automated Playlist Update [skip ci]" || echo "No changes"
          git push origin main --force
