name: RUN SCRIPT

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil python-dotenv

      - name: Run Scraper Script
        run: |
          python run_scraper.py

      - name: Commit and Push Playlist Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41851482+github-actions[bot]@users.noreply.github.com"
          git add dlhd.m3u
          git diff-index --quiet HEAD || git commit -m "Clean Raw M3U for HLS Proxy Server"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
