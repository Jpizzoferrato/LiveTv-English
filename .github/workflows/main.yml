name: RUN SCRIPT

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests

      - name: Gather m3u
        run: |
          echo "import requests, urllib3, re" > run_scraper.py
          echo "urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)" >> run_scraper.py
          echo "url = 'https://dlhd.pk/24-7-channels.php'" >> run_scraper.py
          echo "headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36', 'Accept': 'text/html', 'Referer': 'https://dlhd.pk/'}" >> run_scraper.py
          echo "final_channels = []" >> run_scraper.py
          echo "try:" >> run_scraper.py
          echo "    res = requests.get(url, headers=headers, timeout=20, verify=False)" >> run_scraper.py
          echo "    if res.status_code == 200:" >> run_scraper.py
          echo "        matches = re.findall(r'href=[\"\'][^\"\']*?watch\.php\?id=(\d+)[^\"\']*?[\"\']\s+data-title=[\"\']([^\"\']+)[\"\']', res.text)" >> run_scraper.py
          echo "        if not matches:" >> run_scraper.py
          echo "            matches = re.findall(r'data-title=[\"\']([^\"\']+)[\"\']\s+href=[\"\'][^\"\']*?watch\.php\?id=(\d+)', res.text)" >> run_scraper.py
          echo "            if matches: matches = [(item[1], item[0]) for item in matches]" >> run_scraper.py
          echo "        for ch_id, name in matches:" >> run_scraper.py
          echo "            ch_id, clean_name = str(ch_id).strip(), str(name).strip().upper()" >> run_scraper.py
          echo "            if not ch_id or not clean_name or ch_id == '00': continue" >> run_scraper.py
          echo "            name_lower = clean_name.lower()" >> run_scraper.py
          echo "            if 'adult swim' in name_lower: pass" >> run_scraper.py
          echo "            elif any(w in name_lower for w in ['xxx','porn','adult','18+','playboy','hustler','pink','brazzers']): continue" >> run_scraper.py
          echo "            if any(w in name_lower for w in ['news','msnbc','cnn','cbsn']) and not any(w in name_lower for w in ['fox','israel','i24']): continue" >> run_scraper.py
          echo "            if not any(w in name_lower for w in ['israel','i24','ch 12 il','ch 13 il','ch 11 il']) and 'sky sports' not in name_lower:" >> run_scraper.py
          echo "                if any(' ' + r in name_lower or '(' + r in name_lower or name_lower.endswith(r) or name_lower.startswith(r) for r in ['uk','united kingdom','itv','bbc','bt sport','premier sports','tnt sports','italy','italia','spain','espana','germany','deutschland',' de','(de)','france','fr ','portugal','arabic','netherlands','greece','cyprus','albania','romania','poland','polska','turkey','turkiye','indonesia','indosiar','india','pakistan','latino','mexico','argentina','austria','slovakia','slovenia','sweden','chile','colombia','peru','ecuador','venezuela','uruguay','paraguay','tabii','eleven sports','dazn','bein sports','supersport','canale','rai','rtve']): continue" >> run_scraper.py
          echo "            for p in range(1, 7):" >> run_scraper.py
          echo "                stream_url = f'/dlhd/stream-{ch_id}.php?p={p}'" >> run_scraper.py
          echo "                final_channels.append((f'{clean_name} (P{p})', stream_url))" >> run_scraper.py
          echo "        with open('dlhd.m3u', 'w', encoding='utf-8') as f:" >> run_scraper.py
          echo "            f.write('#EXTM3U\n\n')" >> run_scraper.py
          echo "            idx = 1" >> run_scraper.py
          echo "            for name, url in final_channels:" >> run_scraper.py
          echo "                group = 'DLHD Live Sports' if ('live event:' in name.lower() or 'vs' in name.lower()) else 'DLHD United States & General'" >> run_scraper.py
          echo "                f.write(f'#EXTINF:-1 tvg-id=\"ch-{idx}\" tvg-name=\"{name}\" group-title=\"{group}\" http-referrer=\"https://dlhd.pk/\",{name}\n#EXTVLCOPT:http-referrer=https://dlhd.pk/\n{url}\n\n')" >> run_scraper.py
          echo "                idx += 1" >> run_scraper.py
          echo "        print(f'Build complete. Generated {idx - 1} channels.')" >> run_scraper.py
          echo "except Exception as e: print(f'Error: {e}')" >> run_scraper.py
          python run_scraper.py

      - name: Commit and Push Playlist Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41851482+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Deploy line-buffered echo script build matrix"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
