name: RUN SCRIPT

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil python-dotenv

      - name: Gather m3u
        run: |
          cat << 'EOF' > run_scraper.py
          import requests
          import re
          import urllib3
          from bs4 import BeautifulSoup

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          def main():
              headers = {
                  "User-Agent": "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36",
                  "Referer": "https://daddylive.org/"
              }
              
              print("Fetching total page source to locate script endpoints...")
              res = requests.get("https://daddylive.org/channel", headers=headers, timeout=15, verify=False)
              
              if res.status_code == 200:
                  print("Analyzing full scripts inside HTML...")
                  soup = BeautifulSoup(res.text, 'html.parser')
                  
                  # Look for any internal or external javascript files
                  scripts = soup.find_all('script')
                  for idx, script in enumerate(scripts):
                      src = script.get('src', '')
                      content = script.string if script.string else ''
                      
                      if src:
                          print(f"Found Script File [{idx}]: {src}")
                      if "fetch" in content or "ajax" in content or "$.get" in content or "json" in content:
                          print(f"\n--- Found Data Fetching Logic in Script Block [{idx}] ---")
                          print(content.strip()[:2000])
                          print("------------------------------------------------------\n")
              else:
                  print(f"Failed to connect. Status code: {res.status_code}")

          if __name__ == "__main__":
              main()
          EOF
          python run_scraper.py
