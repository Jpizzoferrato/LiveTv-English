name: RUN SCRIPT
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allows manual execution

jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil python-dotenv

      - name: Gather m3u
        run: |
          cat << 'EOF' > run_scraper.py
          import requests
          import re
          import urllib3
          from bs4 import BeautifulSoup

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          def get_html(url):
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/132.0.0.0 Safari/537.36"
              }
              try:
                  res = requests.get(url, headers=headers, timeout=15, verify=False)
                  res.raise_for_status()
                  return res.text
              except Exception as e:
                  print(f"Error loading {url}: {e}")
                  return None

          def main():
              channels = []
              
              # 1. Scraping 24/7 Channels by tracking raw stream href links
              print("Scraping 24/7 channels from daddylive.org...")
              html_247 = get_html("https://daddylive.org/24-7-channels.php")
              if html_247:
                  soup = BeautifulSoup(html_247, 'html.parser')
                  links = soup.find_all('a', href=re.compile(r'id=\d+'))
                  print(f"Extracted {len(links)} raw channel links.")
                  
                  for link in links:
                      name = link.text.strip()
                      href = link.get('href', '')
                      if not name or 'id=' not in href: continue
                      ch_id = href.split('id=')[1].split('&')[0]
                      
                      if name == "Sky Calcio 7 (257) Italy": name = "DAZN"
                      if ch_id == "853": name = "Canale 5 Italy"
                      
                      stream_url = f"https://daddylive.org/watch.php?id={ch_id}"
                      channels.append((name, stream_url))

              # 2. Scraping Live Schedule Events
              print("Scraping live scheduled events from daddylive.org...")
              html_schedule = get_html("https://daddylive.org/index.php")
              if html_schedule:
                  soup = BeautifulSoup(html_schedule, 'html.parser')
                  event_links = soup.find_all('a', href=re.compile(r'stream-\d+\.php'))
                  for link in event_links:
                      name = link.text.strip()
                      href = link.get('href', '')
                      if not name or not href: continue
                      if "Stream" in name:
                          name = f"Live Event: {name}"
                      stream_url = f"https://daddylive.org/{href}"
                      channels.append((name, stream_url))

              # 3. Duplicate Handling Engine for USA Network Backups
              if not channels:
                  print("No channels found. Keeping file generic to prevent crashes.")
                  with open("dlhd.m3u", "w", encoding="utf-8") as f:
                      f.write("#EXTM3U\n")
                  return

              name_counts = {}
              for name, _ in channels:
                  name_counts[name] = name_counts.get(name, 0) + 1

              final_channels = []
              name_counter = {}
              for name, url in channels:
                  if name_counts[name] > 1:
                      if name not in name_counter:
                          name_counter[name] = 1
                      else:
                          name_counter[name] += 1
                      new_name = f"{name} ({name_counter[name]})"
                      final_channels.append((new_name, url))
                  else:
                      final_channels.append((name, url))

              with open("dlhd.m3u", "w", encoding="utf-8") as f:
                  f.write("#EXTM3U\n\n")
                  for name, url in final_channels:
                      f.write(f'#EXTINF:-1 group-title="DLHD Combined",{name}\n{url}\n\n')
              print(f"Successfully created dlhd.m3u with {len(final_channels)} total channels!")

          if __name__ == "__main__":
              main()
          EOF
          python run_scraper.py

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Download the latest changes from the remote repository
        run: git pull --rebase origin main || echo "No remote changes to merge"

      - name: Add generated files to commit
        run: |
          git add dlhd.m3u
          git commit -m "UPDATE PLAYLIST" || echo "No changes to commit"

      - name: Push changes
        run: git push
