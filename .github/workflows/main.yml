name: RUN SCRIPT

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Gather m3u
        run: |
          cat << 'EOF' > run_scraper.py
          import requests
          import urllib3
          import json

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          def main():
              raw_channels = []
              final_channels = []
              
              headers = {
                  "User-Agent": "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36",
                  "Referer": "https://daddylive.org/channel"
              }
              
              url = "https://daddylive.org/cache/channels.json"
              print(f"Fetching channels directly from database endpoint: {url}")
              
              try:
                  res = requests.get(url, headers=headers, timeout=15, verify=False)
                  if res.status_code == 200:
                      channels_data = res.json()
                      
                      for ch in channels_data:
                          ch_id = str(ch.get('id', '')).strip()
                          name = str(ch.get('title', '')).strip()
                          
                          # Skip placeholders or empty items
                          if not ch_id or not name or ch_id == "00":
                              continue
                          
                          # Preserve your custom replacements
                          if name == "Sky Calcio 7 (257) Italy": name = "DAZN"
                          if ch_id == "853": name = "Canale 5 Italy"
                          
                          raw_channels.append((name, ch_id))
                  else:
                      print(f"Server returned non-200 status code: {res.status_code}")
              except Exception as e:
                  print(f"Network processing error occurred: {e}")

              # SAFETY BRAKE: Protects your file if the database read drops or fails
              if not raw_channels:
                  print("⚠️ No channels parsed! Stopping run to protect your current dlhd.m3u file.")
                  return

              print(f"✅ Successfully loaded {len(raw_channels)} channels! Formatting proxy paths...")
              for name, ch_id in raw_channels:
                  for play_num in range(1, 7):
                      stream_url = f"http://pizzotv.duckdns.org:8080/dlhd/stream-{ch_id}.php?p={play_num}"
                      final_channels.append((f"{name} (P{play_num})", stream_url))

              print("Writing processed IPTV playlist lines...")
              with open("dlhd.m3u", "w", encoding="utf-8") as f:
                  f.write("#EXTM3U\n\n")
                  
                  valid_idx = 1
                  for name, url in final_channels:
                      clean_name = str(name).split('\n')[0].strip()
                      name_lower = clean_name.lower()
                      
                      if "adult swim" in name_lower:
                          pass 
                      else:
                          adult_keywords = ["xxx", "porn", "adult", "18+", "playboy", "hustler", "penthouse", "pink", "brazzers"]
                          if any(word in name_lower for word in adult_keywords):
                              continue
                          
                      foreign_countries = [
                          "italy", "italia", "spain", "espana", "germany", "deutschland", 
                          "france", "portugal", "arabic", "netherlands", "greece", "cyprus", 
                          "albania", "romania", "poland", "polska", "turkey", "turkiye", 
                          "india", "pakistan", "latino", "mexico", "argentina"
                      ]
                      if any(f" {country}" in name_lower or f"({country})" in name_lower for country in foreign_countries):
                          continue
                      
                      if "live event:" in name_lower or "vs" in name_lower:
                          group = "DLHD Live Sports"
                      elif "uk" in name_lower:
                          group = "DLHD United Kingdom"
                      else:
                          group = "DLHD United States & General"
                          
                      f.write(f'#EXTINF:-1 tvg-id="ch-{valid_idx}" tvg-name="{clean_name}" group-title="{group}",{clean_name}\n')
                      f.write(f'{url}\n\n')
                      valid_idx += 1
              print(f"All done! Processed {valid_idx - 1} entries into your playlist.")

          if __name__ == "__main__":
              main()
          EOF
          python run_scraper.py

      - name: Commit and Push Playlist Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41851482+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Clean Raw M3U for HLS Proxy Server targeting channels JSON database"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
